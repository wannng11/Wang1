<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>個人首頁</title>
    <link rel="stylesheet" href="css/0602-color.css">
    <style>
        body{background-color: var(--bg-primary);
        }

    /* s01頭貼 */
    .s01{
        background-color: var(--bg-card);
        height: 100vh;
        position: relative;
    }
    .s01 .box01{
        width: 200px;
        height: 200px;
        background-color: var(--accent-primary);
        position: absolute;
        top:0;
        left: 0;
    }
    .s01 .box02{
        width: 200px;
        height: 200px;
        background-color: var(--accent-primary);
        position: absolute;
        top: 0;
        right: 0;
    }
    .s01 .box03{
        width: 200px;
        height: 200px;
        background-color: var(--accent-primary);
        position: absolute;
        bottom: 0;
        left: 0;
    }
    .s01 .box04{
        width: 200px;
        height: 200px;
        background-color: var(--accent-primary);
        position: absolute;
        bottom: 0;
        right: 0;
    }

    .s01 .userImg{
        position: absolute;
        top: 100px;
        left: 100px;
        bottom: 100px;
        right: 100px;
        background-image:url(images/cat.jpg);
        background-position: center center;
        background-size: cover;
        border-radius: 15px;
        box-shadow:var(--shadow);
    }
    .s01 .userText{
        position: absolute;
        top:15%;
        left:15%;
        right:60%;
    }

    /* s02作品區 */
    .s02{
        padding: 80px 10%;
        background-color: var(--bg-secondary);
        text-align:center;
    }
    .s02 h2{
        font-size: 42px;
    }
    .s02 .card{
        display: inline-block;
        margin: 15px;
        width: 240px;
        background-color: var(--bg-card);
        padding: 20px;
        text-align: left;
        border-radius: 12px;
    }
    .s02 .card h3{
        color:var(--text-primary);
        margin-top: 0;
    }
    .s02 .card p{
        line-height: 1.7;
        color: var(--text-secondary);
    }
    </style>
</head>
<body>
   <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>
        <div class="userImg"></div>
        <div class="userText">
            <h1>喵咪介紹</h1>
            <hr>
            <h2>我是一隻貓</h2>
            <p>我是一隻貓 我愛吃魚喵喵喵喵喵</p>
        </div>
   </section>
   <section class="s02">
        <h2>我的作品</h2>

         <!--作品01  -->
        <div class="card">
            <h3>切版練習</h3>
            <p>使用html、css練習切版</p>
            <a href="0528-2.html" target="_blank">查看作品</a>
        </div>
            <!--作品02  -->
        <div class="card">
            <h3>Bootstrap練習</h3>
            <p>使用Bootstrap製作照片頁面選單</p>
            <a href="0605-1.html" target="_blank">查看作品</a>
        </div>
      <!--作品03  -->
        <div class="card">
            <h3>表格練習</h3>
            <p>ERP商品表單設計並用AI進行優化</p>

        </div>

            <h3>切版練習</h3>

        </div> -->

   </section>
</body>
</html>
