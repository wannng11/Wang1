<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切版練習</title>
    <link rel="stylesheet" href="css/my2.css">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: var(--mycolor01); 
            font-family: "Comic Sans MS", sans-serif ;
            color: var(--color06);
            line-height: 1.8;
        }
        .wrapper{   
            width: 1024px;
            margin: 30px auto;
            background-color: var(--color05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--color07);
        }
        .imgbox{
            width: 1024px;
            height: 240px;
            background-image:
            linear-gradient(
             var(--color02) ,
              var(--color02)
            ),
            url(images/bamboo.jpg);

            background-position: center center;
            background-size: cover;
            border-bottom: 4px solid var(--color03);
        }
        nav{
            background-color: var(--color04);
            text-align: center;
            padding-top: 18px;
            padding-bottom: 18px;
            border-bottom: 3px solid var(--color03);
        }
            
        nav ul{display: inline-block;}
        nav ul li{float: left;
            list-style-type: none;}
        nav ul li a{
            text-decoration: none;
            display: block;

            background-color: var(--color03);
            color: var(--color06);
            margin-right: 12px;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px var(--color7);
            transition:all 0.3s ease;
         }
        nav ul li a:hover{
            background-color: #e6bb67;
            transform: translateY(-2px);
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(212,166,74,0.4);
        }
        .content{
            background-color: var(--color05);
            text-align: center;
            padding-top: 50px;
            padding-bottom: 60px;
            padding-left: 70px;
            padding-right: 70px;
        }
        .content h1{
            color: var(--color04);

            font-size: 52px;
            font-weight: bold;

            margin-bottom: 25px;

            letter-spacing: 3px;

            position: relative;
        }
        .content h1::after{
            content: "";

            width: 80px;
            height: 4px;

            background-color: var(--color03);

            display: block;

            margin: 15px auto 0 auto;

            border-radius: 50px;
        }
        .content p{
            font-size: 20px;
            
            color: #444444;

            margin-bottom: 25px;

            text-align: justify;
        
        }
        .content a{
            text-decoration: none;

            background-color: var(--color04);
            color: var(--color05);

            width: 160px;
            height: 48px;

            display: block;

            margin: 40px auto 0 auto;

            font-size: 18px;
            font-weight: bold;

            border-radius: 8px;

            line-height: 48px;

            letter-spacing: 1px;

            box-shadow: 0 6px 15px var(--color02);

            transition: all 0.3s ease;
        }
        .content a:hover{
            background-color: #14533f;

            transform: translateY(-3px);

            box-shadow: 0 10px 20px rgba(15,61,46,0.35);
        }    
        .footer{  
            background-color: var(--color04);

            color: var(--color05);

            padding: 20px 15px;

            text-align: center;

            border-top: 3px solid var(--color03);
            }
        .footer p{
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        @media screen and (max-width:1024px){
            .wrapper{width: 100%;}
            .imgbox{width: 100%;
                height: 140px;
            
            }
            nav ul{
                display: block;
                padding-left: 10px;
                margin: 0;
            }
            nav ul li{
                float: none;
                margin-bottom: 10px;
            }
            nav ul li a{
                background-color:var(--color03) ;
                color: var(--color06);
            }
            .content{
                padding-left: 10px;
                padding-right: 10px;
            }
            .content p{
                font-size: 18px;
                line-height: 1.4;
                text-align: left;
            
            }
        }
            
    </style>
</head>
<body>
     <!-- # id          . class -->
    <div class="wrapper">
        <div class="banner">
            <div class="imgbox"></div>
            <nav>
                <ul>
                    <li><a href="#">
                        <i class="fa-solid fa-house fa-1x"></i>首頁</a>
                    </li>
                    <li><a href="#"><i class="fa-solid fa-newspaper"></i>最新消息</a></li>
                    <li><a href="#"><i class="fa-solid fa-store"></i>合作店家</a></li>
                    <li><a href="#"><i class="fa-solid fa-circle-info"></i>關於我們</a></li>
                    <li><a href="#"><i class="fa-solid fa-square-phone"></i>聯絡我們</a></li>
                </ul>
            </nav>
        </div>
        <div class="content">
            <h1 class="fw1500">歡迎光臨</h1>
            <p class="fw500">陽明山故障增強，沒有什麼日記任何求助，好處版權訊息過去，自。</p>
            <p class="fw500">召開情形一眼無數增加傳真名字經歷求職重要特別是，開通減肥感染，劇情態度形式系列，您是最後評論這些帳。</p>
            <p class="fw500">附件好了基礎上技巧窗口都市讀。</p>
            <a href="#">了解更多</a>
        </div>
        <div class="footer">
            <p>By 2026.05</p>
        </div>
    </div>
</body>
</html>
